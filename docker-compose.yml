version: '3.8'

services:
  db:
    image: mariadb:11
    container_name: web-walk-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD:-walkpass}
      - MARIADB_DATABASE=${DB_NAME:-web_walk}
      - MARIADB_USER=${DB_USER:-walk}
      - MARIADB_PASSWORD=${DB_PASSWORD:-walkpass}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-walk:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: web-walk
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${OUTPUT_DIR:-./data}:/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - OUTPUT_DIR=/data
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DB_HOST=db
      - DB_USER=${DB_USER:-walk}
      - DB_PASSWORD=${DB_PASSWORD:-walkpass}
      - DB_NAME=${DB_NAME:-web_walk}
      - DB_PORT=3306
      - TZ=Europe/Bratislava
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db-data:
